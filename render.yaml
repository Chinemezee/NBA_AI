services:
  - type: web
    name: nba-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: static
    name: nba-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false

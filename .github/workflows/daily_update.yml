name: Daily NBA Stats Updater

on:
  schedule:
    # This runs every day at 8:00 AM UTC (Which is 9:00 AM in Nigeria)
    - cron: '0 7 * * *'
  workflow_dispatch: # This allows you to click a button to run it manually anytime

jobs:
  update-csv:
    runs-on: self-hosted

    # --- THIS IS THE FIX ---
    permissions:
      contents: write # This explicitly allows the GitHub bot to push changes back
    # -----------------------

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas nba_api

      - name: Run Stat Updater Script
        run: python append_csvdata.py

      - name: Commit and Push Updated CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add nba_player_game_logs.csv

          # Simplified commit logic: commits if changes exist, safely echoes if not
          git commit -m "Automated daily stat update" || echo "No changes to commit"
          git push || echo "No changes to push"
